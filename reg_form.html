<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="reg_form.css" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rokkitt:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
</head>
<body>
    <div class="box">
      <h1> Registration Form</h1>
      <div class="form-data">
        <form>
          <table>
            <tr>
              <td><label for="fullname">Enter Your FullName</label></td>
              <td>
                <input
                  type="text"
                  id="fullname"
                  name="fullname"
                  placeholder="Enter fullname here"
                  autocomplete="off"
                  spellcheck="true"
                />
                <span class="validation">
                  (fullname shoud be atleast character)</span
                >
              </td>
            </tr>

            <tr>
              <td><label for="email">Enter Your Email</label></td>
              <td>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Enter email here"
                  autocomplete="off"
                />
                <span class="validation"> (please enter proper email)</span>
              </td>
            </tr>

            <tr>
              <td><label for="Address">Enter Your Address</label></td>
              <td>
                <input
                  text="Address"
                  id="Address"
                  name="Address"
                  placeholder="Enter Address here"
                  autocomplete="off"
                />
                <span class="validation"> (please enter proper Address)</span>
              </td>
            </tr>

             <tr>
              <td><label for="password">Enter Your password</label></td>
              <td>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter password here"
                  autocomplete="off"
                />
                <span class="validation"> (please enter proper password)</span>
              </td>
            </tr>

            <tr>
              <td><label for="conform password">Enter Your conform password</label></td>
              <td>
                <input
                  type="conform password"
                  id="conform password"
                  name="conform password"
                  placeholder="Enter conform password here"
                  autocomplete="off"
                />
                <span class="validation"> (please enter proper conform password)</span>
              </td>
            </tr>

    </script>
    <input type="submit" value="Submit">

      <!-- Switch -->
     <label for="switch" style="margin-top:40px; display:block;">
    <input type="checkbox" +id="mySwitch">
    <span class="slider"></span>
</label>

</body>
</html>
